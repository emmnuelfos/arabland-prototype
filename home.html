<style>
  html, body { background: #EAE8E3; color: #2E2D2C; }
  body { font-family: 'Macan Pan', 'Inter', system-ui, sans-serif; font-size: 15px; line-height: 1.65; -webkit-font-smoothing: antialiased; }
  .font-display { font-family: 'Macan Pan', 'Inter', system-ui, sans-serif; font-weight: 400; letter-spacing: -0.025em; } .font-display em, .font-display i { font-style: normal; color: #AC7B43; }
  .font-mono { font-family: 'Macan Pan', 'Inter', sans-serif; font-feature-settings: 'tnum' 1; letter-spacing: 0.02em; }
  .eyebrow { font-family: 'Macan Pan', 'Inter', sans-serif; font-size: 11px; font-weight: 500; letter-spacing: 0.22em; text-transform: uppercase; }
  .num { font-variant-numeric: tabular-nums; }
  .hairline { border-color: #B2B4B2; }
  /* Animated gold underline on links */
  .gold-underline { position: relative; }
  .gold-underline::after {
    content: ''; position: absolute; left: 0; bottom: -3px; height: 1px; width: 0%;
    background: #AC7B43; transition: width 250ms ease-out;
  }
  .gold-underline:hover::after { width: 100%; }
  /* Scroll-reveal */
  .reveal { opacity: 0; transform: translateY(14px); transition: opacity 700ms ease-out, transform 700ms ease-out; }
  .reveal.in { opacity: 1; transform: none; }
  /* Hide scrollbars on horizontal scrollers but keep functionality */
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { scrollbar-width: none; }
  /* Custom focus ring */
  *:focus-visible { outline: 2px solid #AC7B43; outline-offset: 2px; }
  /* Marquee */
  @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  .marquee-track { animation: marquee 60s linear infinite; }
  /* Subtle gold tick */
  .gold-tick::before { content: ''; display: inline-block; width: 14px; height: 1px; background: #AC7B43; margin-right: 12px; vertical-align: middle; }
  /* Tabbed search underline */
  .tab-active { color: #2E2D2C; }
  .tab-active::after { content: ''; display: block; height: 2px; width: 100%; background: #AC7B43; margin-top: 8px; }
  /* Image-loading shimmer */
  .ph-stripe { background-image: repeating-linear-gradient(45deg, #D8D9D7 0 6px, #EAE8E3 6px 12px); }
  /* Cinematic hover — every card image scales + boosts brightness/saturation/contrast on hover */
  .cinematic-img { transition: transform 1000ms cubic-bezier(0.2,0.7,0.2,1), filter 1000ms ease-out; will-change: transform, filter; }
  .group:hover .cinematic-img, .cinematic-img:hover { transform: scale(1.07); filter: brightness(1.07) saturate(1.14) contrast(1.04); }
  /* Search input — no black outline / focus ring in any state */
  input.cp-search, input.cp-search:focus, input.cp-search:focus-visible, input.cp-search:hover { outline: none !important; box-shadow: none !important; border: none !important; -webkit-appearance: none !important; appearance: none !important; background: transparent !important; }


  /* ── Leaflet map: custom ochre pins with pulse animation ──────────────────── */
  .leaflet-container { background: #EAE8E3 !important; font-family: 'Macan Pan', system-ui, sans-serif !important; }
  .leaflet-control-attribution { font-size: 9px !important; background: rgba(246,244,239,0.85) !important; color: #4D4B4A !important; }
  .leaflet-bar a { background: #F4F2EE !important; color: #1A1A1A !important; border-bottom-color: #B2B4B2 !important; }
  .leaflet-bar a:hover { background: #AC7B43 !important; color: #F6F4EF !important; }
  .cp-pin {
    width: 36px; height: 36px; cursor: pointer; position: relative;
    display: grid; place-items: center;
  }
  .cp-pin-dot {
    width: 16px; height: 16px; border-radius: 50%;
    background: #AC7B43; border: 2px solid #F6F4EF;
    box-shadow: 0 2px 8px rgba(26,24,18,0.4);
    position: relative; z-index: 2;
    transition: transform 220ms cubic-bezier(.2,.7,.3,1), background-color 200ms;
  }
  .cp-pin-ring {
    position: absolute; inset: 0; border-radius: 50%;
    background: rgba(172,123,67,0.35);
    animation: cp-pulse 2.4s cubic-bezier(0,0,.2,1) infinite;
  }
  .cp-pin:hover .cp-pin-dot,
  .cp-pin.cp-active .cp-pin-dot { background: #1A1A1A; transform: scale(1.25); }
  .cp-pin.cp-active .cp-pin-ring { background: rgba(26,24,18,0.35); }
  @keyframes cp-pulse {
    0%   { transform: scale(.55); opacity: .85; }
    100% { transform: scale(1.6);  opacity: 0; }
  }
  .cp-tooltip {
    background: #1A1A1A; color: #F6F4EF; padding: 6px 10px;
    font-size: 12px; font-variant-numeric: tabular-nums; letter-spacing: .02em;
    border: none; box-shadow: 0 6px 18px rgba(0,0,0,.25);
  }
  .cp-tooltip::before { border-top-color: #1A1A1A !important; }
  /* No emoji default */
</style>

<body>
  <!-- Global scroll flag — parallax handlers read window.__cpScrolling to bail
       out during page scroll, so wheel events never fight image transforms. -->
  <script>
    (function () {
      window.__cpScrolling = false;
      var t;
      window.addEventListener('scroll', function () {
        window.__cpScrolling = true;
        clearTimeout(t);
        t = setTimeout(function () { window.__cpScrolling = false; }, 180);
      }, { passive: true });
    })();
  </script>
